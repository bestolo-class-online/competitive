<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生資訊競賽投稿平台</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 載入 React 與 ReactDOM (生產環境穩定 UMD 版本) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Firebase Compat CDN (最高階跨網域相容性) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  
  <!-- 根掛載節點 -->
  <div id="root">
    <div class="flex flex-col justify-center items-center h-screen bg-slate-50 p-6 text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
      <h3 class="text-lg font-bold text-slate-800 mb-1">投稿系統安全載入中...</h3>
      <p class="text-xs text-slate-500 max-w-sm leading-relaxed">正在安全初始化並載入雲端配置，請稍候。</p>
    </div>
  </div>

  <!-- 💡 [HTML 註解標註區] 系統內置展示帳號資訊以 HTML 註解方式保存，不呈現在網頁畫面上 -->
  <!-- 
  =======================================================
  💡 系統內置展示帳號資訊（可直接用於測試登入）：
  =======================================================
  <div class="w-full max-w-md mt-6 bg-slate-100 border border-slate-200 rounded-xl p-4 text-xs text-slate-600 shadow-sm">
    <p class="font-bold text-slate-700 mb-2 flex items-center gap-1.5">
      <i class="fa-solid fa-circle-info text-blue-500"></i> 系統內置展示帳號資訊（可直接測試登入）：
    </p>
    <div class="grid grid-cols-3 gap-2">
      <div class="bg-white p-2 rounded border border-slate-200">
        <p class="font-bold text-slate-800">🛡️ 管理者</p>
        <p>帳號: admin</p>
        <p>密碼: admin123</p>
      </div>
      <div class="bg-white p-2 rounded border border-slate-200">
        <p class="font-bold text-slate-800">👨‍🏫 評審委員</p>
        <p>帳號: teacher</p>
        <p>密碼: teacher123</p>
      </div>
      <div class="bg-white p-2 rounded border border-slate-200">
        <p class="font-bold text-slate-800">👨‍🎓 參賽學生</p>
        <p>帳號: student</p>
        <p>密碼: student123</p>
      </div>
    </div>
  </div>
  =======================================================
  -->

  <!-- 使用 100% 原生相容 JavaScript，無 Babel 即時轉譯，徹底解決跨網域沙盒 import/appendChild 錯誤 -->
  <script>
    (function() {
      var useState = React.useState;
      var useEffect = React.useEffect;
      var h = React.createElement;

      // ==========================================
      // ⚠️ 您的 Firebase Config 設定 ⚠️
      // ==========================================
      var myFirebaseConfig = {
        apiKey: "AIzaSyDCx4EegIg4bvxVbGTgTBUrCczcHibTbSw",
        authDomain: "hsescompetitive.firebaseapp.com",
        projectId: "hsescompetitive",
        storageBucket: "hsescompetitive.firebasestorage.app",
        messagingSenderId: "828617923145",
        appId: "1:828617923145:web:3491fa6d814e0bdfe5bd98"
      };

      var isFirebaseConfigured = myFirebaseConfig.apiKey && myFirebaseConfig.apiKey !== "YOUR_API_KEY";

      var app = null;
      var auth = null;
      var db = null;
      var firebaseReady = false;

      try {
        if (isFirebaseConfigured && typeof firebase !== 'undefined') {
          app = firebase.initializeApp(myFirebaseConfig);
          auth = firebase.auth();
          db = firebase.firestore();
          firebaseReady = true;
        }
      } catch (e) {
        console.warn("Firebase 初始化失敗：", e);
      }

      var appId = 'hsescompetitive';

      // 預設系統配置
      var DEFAULT_CATEGORIES = ['軟體開發組', '多媒體動畫組', '資訊安全組', '大數據分析組'];
      
      // 預設三大內建使用者 (當資料庫完全為空時自動種植)
      var SEED_USERS = [
        { account: 'admin', password: 'admin123', name: '系統管理員', role: 'ADMIN', school: '管理處' },
        { account: 'teacher', password: 'teacher123', name: '李教授評審', role: 'TEACHER', school: '資訊工程系' },
        { account: 'student', password: 'student123', name: '王小明', role: 'STUDENT', school: '資工三甲' }
      ];

      var MOCK_STATUSES = {
        DRAFT: { label: '草稿', color: 'bg-gray-100 text-gray-800' },
        SUBMITTED: { label: '已送出 / 待審核', color: 'bg-blue-100 text-blue-800' },
        REVIEWING: { label: '審核中', color: 'bg-yellow-100 text-yellow-800' },
        REVISION_REQUIRED: { label: '需補件', color: 'bg-orange-100 text-orange-800' },
        APPROVED: { label: '通過', color: 'bg-green-100 text-green-800' },
        REJECTED: { label: '未通過', color: 'bg-red-100 text-red-800' }
      };

      var INITIAL_PROJECTS = [
        { id: 'mock-1', title: 'AI校園導覽機器人', category: '軟體開發組', student: '王小明', studentId: 'student', school: '資工三甲', date: '2026-06-15', uploadTime: '2026/06/15 下午 02:30:15', status: 'APPROVED', summary: '整合大型語言模型與語音辨識技術，開發校園智慧導覽軟體系統。', fileName: 'architecture_doc.pdf', fileSize: 1048576, fileType: 'application/pdf', thumbnail: '' }
      ];

      // ==========================================
      // 獨立元件 1: 登入介面 (移至外部，避免狀態丟失)
      // ==========================================
      function LoginView(props) {
        var users = props.users;
        var handleLogin = props.handleLogin;
        var accState = useState('');
        var pwState = useState('');
        
        // 💡 僅返回登入卡片，測試用的內置展示帳號面板已被移至外部 HTML 註解內，不予呈現
        return h('div', { className: "min-h-screen flex flex-col justify-center items-center px-4 bg-gradient-to-tr from-slate-100 to-slate-200" },
          h('div', { className: "w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-100" },
            h('div', { className: "text-center mb-8" },
              h('div', { className: "mx-auto h-12 w-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 text-2xl mb-3 shadow-inner" },
                h('i', { className: "fa-solid fa-graduation-cap" })
              ),
              h('h2', { className: "text-2xl font-black text-slate-800 tracking-wide" }, "競賽作品投稿平台"),
              h('p', { className: "text-xs text-slate-400 mt-1.5" }, "HSES Student Information Competition")
            ),
            h('div', { className: "space-y-4" },
              h('div', null,
                h('label', { className: "block text-xs font-bold text-slate-500 mb-1.5 uppercase" }, "使用者帳號"),
                h('div', { className: "relative" },
                  h('i', { className: "fa-solid fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-sm" }),
                  h('input', {
                    type: "text",
                    value: accState[0],
                    onChange: function(e) { accState[1](e.target.value); },
                    className: "w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition text-sm text-slate-700",
                    placeholder: "請輸入帳號"
                  })
                )
              ),
              h('div', null,
                h('label', { className: "block text-xs font-bold text-slate-500 mb-1.5 uppercase" }, "密碼"),
                h('div', { className: "relative" },
                  h('i', { className: "fa-solid fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-sm" }),
                  h('input', {
                    type: "password",
                    value: pwState[0],
                    onChange: function(e) { pwState[1](e.target.value); },
                    className: "w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition text-sm text-slate-700",
                    placeholder: "請輸入密碼",
                    onKeyDown: function(e) { if (e.key === 'Enter') handleLogin(accState[0], pwState[0]); }
                  })
                )
              ),
              h('button', {
                onClick: function() { handleLogin(accState[0], pwState[0]); },
                className: "w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition shadow-lg shadow-blue-500/10 active:scale-[0.98] mt-2 text-sm"
              }, "安全登入")
            )
          )
        );
      }

      // ==========================================
      // 獨立元件 2: 學生端投稿表單 (狀態永不丟失)
      // ==========================================
      function StudentSubmitForm(props) {
        var categories = props.categories;
        var systemSettings = props.systemSettings;
        var currentUser = props.currentUser;
        var firebaseReady = props.firebaseReady;
        var db = props.db;
        var appId = props.appId;
        var projects = props.projects;
        var updateProjectsDb = props.updateProjectsDb;
        var setCurrentView = props.setCurrentView;
        var triggerToast = props.triggerToast;
        var formatBytes = props.formatBytes;
        var checkSubmissionOpen = props.checkSubmissionOpen;

        var formState = useState({ title: '', category: categories[0] || '', summary: '', advisor: '' });
        var formData = formState[0];
        var setFormData = formState[1];

        // 僅保留原始的 file 物件狀態，安全存檔
        var fileState = useState(null); 
        var file = fileState[0];
        var setFile = fileState[1];

        var submitState = useState(false);
        var submitting = submitState[0];
        var setSubmitting = submitState[1];

        var isOpen = checkSubmissionOpen();

        var handleFileChange = function(e) {
          var selectedFile = e.target.files[0];
          if (!selectedFile) return;

          // 限制 20MB
          var maxLimit = 20 * 1024 * 1024;
          if (selectedFile.size > maxLimit) {
            triggerToast("檔案超過 20MB 上限限制！請選擇較小的檔案。", "error");
            e.target.value = null;
            return;
          }

          setFile(selectedFile);
          triggerToast("檔案已成功載入！按下送出後系統會自動為圖檔生成審核縮圖。", "success");
        };

        var handleSave = async function(isDraft) {
          if (!isOpen) {
            triggerToast("目前非開放投稿時間，禁止新增投稿！", "error");
            return;
          }

          if (!formData.title.trim()) {
            triggerToast("請輸入作品名稱！", "error");
            return;
          }

          if (!file) {
            triggerToast("請上傳您的作品檔案 (限20MB內)！", "error");
            return;
          }
          
          setSubmitting(true);
          var targetStatus = isDraft ? 'DRAFT' : 'SUBMITTED';
          var uploadTimeStr = new Date().toLocaleString('zh-TW', { hour12: true });

          // 儲存主程式
          var executeSave = async function(thumbnailBase64) {
            var newProject = {
              title: formData.title,
              category: formData.category,
              school: currentUser.school || '資工三甲',
              student: currentUser.name,
              studentId: currentUser.account,
              advisor: formData.advisor || '無',
              summary: formData.summary || '未提供作品摘要。',
              date: new Date().toISOString().split('T')[0],
              uploadTime: uploadTimeStr,
              fileName: file.name,
              fileSize: file.size,
              fileType: file.type,
              thumbnail: thumbnailBase64 || '',
              status: targetStatus
            };

            if (firebaseReady && db) {
              try {
                var collectionPath = 'artifacts/' + appId + '/public/data/projects';
                await db.collection(collectionPath).add(newProject);
                triggerToast(isDraft ? '草稿儲存成功！' : '參賽作品已成功上傳並發送至雲端審核！', "success");
                setCurrentView('DASHBOARD');
              } catch (err) {
                console.error(err);
                triggerToast('雲端儲存失敗，請檢查 Firestore 安全規則是否允許寫入。', "error");
              } finally {
                setSubmitting(false);
              }
            } else {
              var simulatedId = 'local-' + Date.now();
              var updatedList = [Object.assign({ id: simulatedId }, newProject)].concat(projects);
              updateProjectsDb(updatedList);
              triggerToast("[本地儲存成功] " + (isDraft ? '草稿已暫存！' : '參賽作品已發布！'), "success");
              setCurrentView('DASHBOARD');
              setSubmitting(false);
            }
          };

          // 在送出的那一瞬間，才在背景處理壓縮與縮圖
          if (file && file.type && file.type.indexOf('image/') === 0) {
            triggerToast("系統正在在背景安全生成評定縮圖中，請稍候...", "info");
            var reader = new FileReader();
            reader.onload = function(event) {
              var img = new Image();
              img.onload = function() {
                var canvas = document.createElement('canvas');
                var max_width = 320; 
                var scale = max_width / img.width;
                canvas.width = max_width;
                canvas.height = img.height * scale;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                var compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                executeSave(compressedBase64);
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          } else {
            executeSave('');
          }
        };

        return h('div', { className: "max-w-3xl bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-100 text-left" },
          !isOpen && h('div', { className: "mb-6 bg-red-50 border border-red-200 text-red-800 p-4 rounded-xl text-sm font-bold flex items-center gap-2" },
            h('i', { className: "fa-solid fa-triangle-exclamation text-lg" }),
            "⚠️ 目前「非開放投稿期間」！開放時段為：" + systemSettings.submissionStart + " 至 " + systemSettings.submissionEnd
          ),
          h('div', { className: "space-y-6" },
            h('div', { className: "grid grid-cols-1 sm:grid-cols-2 gap-6" },
              h('div', null,
                h('label', { className: "block text-sm font-semibold text-slate-700 mb-2" }, "作品名稱 ", h('span', { className: "text-red-500" }, "*")),
                h('input', {
                  type: "text",
                  disabled: !isOpen,
                  value: formData.title,
                  onChange: function(e) { setFormData(Object.assign({}, formData, { title: e.target.value })); },
                  className: "w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition text-sm disabled:bg-slate-100",
                  placeholder: "例如：智慧防護居家物聯網平台"
                })
              ),
              h('div', null,
                h('label', { className: "block text-sm font-semibold text-slate-700 mb-2" }, "競賽組別 ", h('span', { className: "text-red-500" }, "*")),
                h('select', {
                  disabled: !isOpen,
                  value: formData.category,
                  onChange: function(e) { setFormData(Object.assign({}, formData, { category: e.target.value })); },
                  className: "w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none bg-white transition cursor-pointer text-sm disabled:bg-slate-100"
                },
                  categories.map(function(c) { return h('option', { key: c, value: c }, c); })
                )
              ),
              h('div', null,
                h('label', { className: "block text-sm font-semibold text-slate-700 mb-2" }, "指導老師 (選填)"),
                h('input', {
                  type: "text",
                  disabled: !isOpen,
                  value: formData.advisor,
                  onChange: function(e) { setFormData(Object.assign({}, formData, { advisor: e.target.value })); },
                  className: "w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition text-sm disabled:bg-slate-100",
                  placeholder: "若無則留空"
                })
              ),
              h('div', null,
                h('label', { className: "block text-sm font-semibold text-slate-700 mb-2" }, "參賽班級"),
                h('input', {
                  type: "text",
                  disabled: true,
                  value: currentUser.school,
                  className: "w-full p-3 border border-slate-200 rounded-xl bg-slate-100 text-sm outline-none text-slate-500"
                })
              )
            ),
            h('div', null,
              h('label', { className: "block text-sm font-semibold text-slate-700 mb-2" }, "作品摘要概述"),
              h('textarea', {
                rows: "4",
                disabled: !isOpen,
                value: formData.summary,
                onChange: function(e) { setFormData(Object.assign({}, formData, { summary: e.target.value })); },
                className: "w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition resize-none text-sm disabled:bg-slate-100",
                placeholder: "請描述作品的設計理念、解決問題及核心亮點功能..."
              })
            ),

            // 檔案上傳區
            h('div', { className: "border border-slate-200 rounded-2xl p-5 bg-slate-50/50 hover:bg-slate-50 transition" },
              h('h4', { className: "text-sm font-bold text-slate-800 mb-3 flex items-center gap-1.5" },
                h('i', { className: "fa-solid fa-paperclip text-blue-500" }), "上傳參賽檔案 (上限 20MB)"
              ),
              h('div', { className: "relative border-2 border-dashed border-slate-200 rounded-xl p-6 text-center bg-white hover:border-blue-400 transition cursor-pointer" },
                h('input', {
                  type: "file",
                  disabled: !isOpen,
                  onChange: handleFileChange,
                  className: "absolute inset-0 w-full h-full opacity-0 cursor-pointer disabled:cursor-not-allowed"
                }),
                h('i', { className: "fa-solid fa-cloud-arrow-up text-3xl text-slate-400 mb-2 block" }),
                h('p', { className: "text-xs sm:text-sm text-slate-600 font-medium" }, "點擊或拖曳檔案至此區域上傳"),
                h('p', { className: "text-[11px] text-slate-400 mt-1" }, "支援 JPG, PNG, PDF, ZIP, PPT 等各式檔案，限制最高 20MB")
              ),
              
              // 檔案選擇後的純資訊小卡 (此處絕不提前生成縮圖)
              file && h('div', { className: "mt-4 p-4 bg-white border border-slate-150 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm" },
                h('div', { className: "flex items-center gap-3.5" },
                  h('div', { className: "h-12 w-12 rounded-lg flex items-center justify-center text-xl " + (
                      file.type && file.type.indexOf('image/') === 0 ? 'bg-emerald-50 text-emerald-500' :
                      file.type && file.type.includes('pdf') ? 'bg-rose-50 text-red-500' :
                      file.type && file.type.includes('zip') ? 'bg-amber-50 text-amber-500' :
                      'bg-blue-50 text-blue-500'
                    )},
                    h('i', { className: "fa-solid " + (
                        file.type && file.type.indexOf('image/') === 0 ? 'fa-file-image' :
                        file.type && file.type.includes('pdf') ? 'fa-file-pdf' :
                        file.type && file.type.includes('zip') ? 'fa-file-zipper' :
                        'fa-file-lines'
                      )})
                  ),
                  h('div', { className: "text-left" },
                    h('p', { className: "text-xs sm:text-sm font-bold text-slate-800" }, file.name),
                    h('p', { className: "text-[11px] text-slate-400 mt-0.5" }, "檔案大小：" + formatBytes(file.size) + " • 類型：" + file.type)
                  )
                ),
                h('button', {
                  type: "button",
                  onClick: function() { setFile(null); },
                  className: "text-slate-400 hover:text-rose-500 transition px-2 py-1"
                }, h('i', { className: "fa-regular fa-circle-xmark text-lg" }))
              )
            ),

            h('div', { className: "flex justify-end space-x-3 pt-4 border-t border-slate-100" },
              h('button', {
                type: "button",
                disabled: submitting || !isOpen,
                onClick: function() { handleSave(true); },
                className: "px-5 py-2.5 border border-slate-200 rounded-xl text-slate-700 font-medium hover:bg-slate-50 transition active:scale-[0.98] disabled:opacity-50 text-sm"
              }, "儲存為草稿"),
              h('button', {
                type: "button",
                disabled: submitting || !isOpen,
                onClick: function() { handleSave(false); },
                className: "px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-600/20 transition active:scale-[0.98] disabled:opacity-50 text-sm"
              }, submitting ? '處理並上傳中...' : '確認送出審查')
            )
          )
        );
      }

      // ==========================================
      // 獨立元件 3: 評審端審查評估面板
      // ==========================================
      function TeacherReviewForm(props) {
        var selectedProject = props.selectedProject;
        var firebaseReady = props.firebaseReady;
        var db = props.db;
        var appId = props.appId;
        var projects = props.projects;
        var updateProjectsDb = props.updateProjectsDb;
        var setCurrentView = props.setCurrentView;
        var setSelectedProject = props.setSelectedProject;
        var triggerToast = props.triggerToast;
        var formatBytes = props.formatBytes;
        var MOCK_STATUSES = props.MOCK_STATUSES;

        var feedbackState = useState('');
        var feedback = feedbackState[0];
        var setFeedback = feedbackState[1];

        var updateState = useState(false);
        var updating = updateState[0];
        var setUpdating = updateState[1];

        if (!selectedProject) return null;

        var handleUpdateStatus = async function(newStatus) {
          setUpdating(true);

          if (firebaseReady && db && !String(selectedProject.id).startsWith('local-')) {
            try {
              var collectionPath = 'artifacts/' + appId + '/public/data/projects';

      // ==========================================
      // 核心主程式 (App)
      // ==========================================
      function App() {
        var currentUserState = useState(null);
        var currentUser = currentUserState[0];
        var setCurrentUser = currentUserState[1];

        var usersState = useState([]);
        var users = usersState[0];
        var setUsers = usersState[1];

        var categoriesState = useState(DEFAULT_CATEGORIES);
        var categories = categoriesState[0];
        var setCategories = categoriesState[1];

        var systemSettingsState = useState({
          submissionStart: '2026-06-01',
          submissionEnd: '2026-06-30'
        });
        var systemSettings = systemSettingsState[0];
        var setSystemSettings = systemSettingsState[1];

        var projectsState = useState(INITIAL_PROJECTS);
        var projects = projectsState[0];
        var setProjects = projectsState[1];

        var currentViewState = useState('LOGIN'); 
        var currentView = currentViewState[0];
        var setCurrentView = currentViewState[1];

        var selectedProjectState = useState(null);
        var selectedProject = selectedProjectState[0];
        var setSelectedProject = selectedProjectState[1];

        var statusBannerState = useState({ type: 'info', text: '系統安全加載中...' });
        var statusBanner = statusBannerState[0];
        var setStatusBanner = statusBannerState[1];

        var toastState = useState({ show: false, message: '', type: 'info' });
        var toast = toastState[0];
        var setToast = toastState[1];

        var triggerToast = function(message, type) {
          if (!type) type = 'info';
          setToast({ show: true, message: message, type: type });
          setTimeout(function() {
            setToast(function(prev) { return Object.assign({}, prev, { show: false }); });
          }, 4000);
        };

        useEffect(function() {
          if (!firebaseReady || !auth) {
            setStatusBanner({ 
              type: 'warning', 
              text: '💡 目前處於「本地安全快取模式」。系統全功能皆已啟用，資料將安全保存在 LocalStorage 中。' 
            });
            var localUsers = localStorage.getItem('hses_users');
            if (!localUsers) {
              localStorage.setItem('hses_users', JSON.stringify(SEED_USERS));
              setUsers(SEED_USERS);
            } else {
              setUsers(JSON.parse(localUsers));
            }
            var localCats = localStorage.getItem('hses_categories');
            if (localCats) setCategories(JSON.parse(localCats));
            var localSettings = localStorage.getItem('hses_settings');
            if (localSettings) setSystemSettings(JSON.parse(localSettings));
            
            var localProjects = localStorage.getItem('hses_projects');
            if (localProjects) {
              setProjects(JSON.parse(localProjects));
            } else {
              localStorage.setItem('hses_projects', JSON.stringify(INITIAL_PROJECTS));
              setProjects(INITIAL_PROJECTS);
            }
            return;
          }

          var runAuth = async function() {
            try {
              await auth.signInAnonymously();
              setStatusBanner({ type: 'success', text: '⚡ 已安全連接 HSES 雲端 Firestore 資料庫，所有數據即時進行雙向同步！' });
            } catch (error) {
              console.error('Firebase 登入失敗:', error);
              setStatusBanner({ 
                type: 'warning', 
                text: '⚠️ 雲端連線失敗，自動降級為本地安全快取模式。' 
              });
            }
          };
          runAuth();
        }, []);

        useEffect(function() {
          if (!firebaseReady || !db) return;

          var usersPath = 'artifacts/' + appId + '/public/data/users';
          var unsubUsers = db.collection(usersPath).onSnapshot(function(snapshot) {
            if (snapshot.empty) {
              SEED_USERS.forEach(function(u) {
                db.collection(usersPath).doc(u.account).set(u);
              });
            } else {
              var data = snapshot.docs.map(function(doc) { return doc.data(); });
              setUsers(data);
            }
          });

          var settingsPath = 'artifacts/' + appId + '/public/data/settings';
          var unsubSettings = db.collection(settingsPath).doc('system_config').onSnapshot(function(doc) {
            if (doc.exists) {
              var data = doc.data();
              if (data.categories) setCategories(data.categories);
              if (data.submissionStart) {
                setSystemSettings({
                  submissionStart: data.submissionStart,
                  submissionEnd: data.submissionEnd
                });
              }
            } else {
              db.collection(settingsPath).doc('system_config').set({
                categories: DEFAULT_CATEGORIES,
                submissionStart: '2026-06-01',
                submissionEnd: '2026-06-30'
              });
            }
          });

          var projectsPath = 'artifacts/' + appId + '/public/data/projects';
          var unsubProjects = db.collection(projectsPath).onSnapshot(function(snapshot) {
            if (!snapshot.empty) {
              var data = snapshot.docs.map(function(doc) {
                return Object.assign({ id: doc.id }, doc.data());
              });
              setProjects(data);
            } else {
              setProjects([]);
            }
          }, function(err) {
            console.error("無法同步作品列表:", err);
          });

          return function() {
            unsubUsers();
            unsubSettings();
            unsubProjects();
          };
        }, [firebaseReady]);

        var updateUsersDb = async function(updatedList) {
          setUsers(updatedList);
          if (!firebaseReady || !db) {
            localStorage.setItem('hses_users', JSON.stringify(updatedList));
          }
        };

        var updateProjectsDb = async function(updatedList) {
          setProjects(updatedList);
          if (!firebaseReady || !db) {
            localStorage.setItem('hses_projects', JSON.stringify(updatedList));
          }
        };

        var updateSettingsDb = async function(newSettings, newCategories) {
          setSystemSettings(newSettings);
          setCategories(newCategories);
          if (firebaseReady && db) {
            var settingsPath = 'artifacts/' + appId + '/public/data/settings';
            await db.collection(settingsPath).doc('system_config').set({
              categories: newCategories,
              submissionStart: newSettings.submissionStart,
              submissionEnd: newSettings.submissionEnd
            });
          } else {
            localStorage.setItem('hses_categories', JSON.stringify(newCategories));
            localStorage.setItem('hses_settings', JSON.stringify(newSettings));
          }
        };

        var handleLogin = function(account, password) {
          var matched = users.find(function(u) {
            return u.account === account.trim() && u.password === password;
          });
          if (matched) {
            setCurrentUser(matched);
            setCurrentView('DASHBOARD');
            triggerToast("登入成功！歡迎回來，" + matched.name, "success");
          } else {
            triggerToast("帳號或密碼錯誤，請重新輸入！", "error");
          }
        };

        var handleLogout = function() {
          setCurrentUser(null);
          setCurrentView('LOGIN');
          setSelectedProject(null);
          triggerToast("您已成功登出系統。", "info");
        };

        var checkSubmissionOpen = function() {
          var today = new Date().toISOString().split('T')[0];
          return today >= systemSettings.submissionStart && today <= systemSettings.submissionEnd;
        };

        var formatBytes = function(bytes) {
          if (!bytes || bytes === 0) return '0 Bytes';
          var k = 1024;
          var sizes = ['Bytes', 'KB', 'MB'];
          var i = Math.floor(Math.log(bytes) / Math.log(k));
          return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        // 頁面主體渲染路由 (將 state 以及 handlers 作為 props 傳入獨立元件，保障狀態永不丟失！)
        var renderMainContent = function() {
          if (currentView === 'LOGIN') {
            return h(LoginView, { users: users, handleLogin: handleLogin });
          }
          
          var activeComponent = null;
          
          if (currentView === 'DASHBOARD') {
            activeComponent = h(DashboardList, {
              currentUser: currentUser,
              projects: projects,
              users: users,
              firebaseReady: firebaseReady,
              db: db,
              appId: appId,
              updateProjectsDb: updateProjectsDb,
              setCurrentView: setCurrentView,
              setSelectedProject: setSelectedProject,
              triggerToast: triggerToast,
              formatBytes: formatBytes,
              MOCK_STATUSES: MOCK_STATUSES
            });
          }
          
          if (currentView === 'SUBMIT_FORM') {
            activeComponent = h(StudentSubmitForm, {
              categories: categories,
              systemSettings: systemSettings,
              currentUser: currentUser,
              firebaseReady: firebaseReady,
              db: db,
              appId: appId,
              projects: projects,
              updateProjectsDb: updateProjectsDb,
              setCurrentView: setCurrentView,
              triggerToast: triggerToast,
              formatBytes: formatBytes,
              checkSubmissionOpen: checkSubmissionOpen
            });
          }
          
          if (currentView === 'REVIEW_FORM') {
            activeComponent = h(TeacherReviewForm, {
              selectedProject: selectedProject,
              firebaseReady: firebaseReady,
              db: db,
              appId: appId,
              projects: projects,
              updateProjectsDb: updateProjectsDb,
              setCurrentView: setCurrentView,
              setSelectedProject: setSelectedProject,
              triggerToast: triggerToast,
              formatBytes: formatBytes,
              MOCK_STATUSES: MOCK_STATUSES
            });
          }
          
          if (currentView === 'ADMIN_USERS') {
            activeComponent = h(AdminUsersView, {
              users: users,
              updateUsersDb: updateUsersDb,
              firebaseReady: firebaseReady,
              db: db,
              appId: appId,
              triggerToast: triggerToast
            });
          }
          
          if (currentView === 'ADMIN_CATEGORIES') {
            activeComponent = h(AdminCategoriesView, {
              categories: categories,
              systemSettings: systemSettings,
              updateSettingsDb: updateSettingsDb,
              triggerToast: triggerToast
            });
          }
          
          if (currentView === 'ADMIN_SETTINGS') {
            activeComponent = h(AdminSettingsView, {
              systemSettings: systemSettings,
              categories: categories,
              updateSettingsDb: updateSettingsDb,
              triggerToast: triggerToast
            });
          }

          return h(Layout, {
            currentUser: currentUser,
            currentView: currentView,
            setCurrentView: setCurrentView,
            setSelectedProject: setSelectedProject,
            systemSettings: systemSettings,
            handleLogout: handleLogout,
            toast: toast,
            setToast: setToast,
            statusBanner: statusBanner,
            triggerToast: triggerToast
          }, activeComponent);
        };

        return renderMainContent();
      }

      var root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(h(App));
    })();
  </script>
</body>
</html>
